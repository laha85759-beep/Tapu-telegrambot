services:
  - type: worker
    name: tapu-telegram-bot
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: python main.py
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: BOT_TOKEN3
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
      - key: TELEGRAM_CHAT_ID3
        sync: false
      - key: NEWS_PROVIDER
        value: "auto"
      - key: NEWSDATA_API_KEY
        sync: false
      - key: NEWS_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: FINNHUB_API_KEY
        sync: false
      - key: MASSIVE_API_KEY
        sync: false
      - key: FETCH_INTERVAL_SECONDS
        value: "900"
      - key: HIGH_IMPACT_CHECK_INTERVAL
        value: "60"
      - key: CRYPTO_SCAN_INTERVAL
        value: "300"
      - key: CRYPTO_MAX_CANDIDATES
        value: "5"
